  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Gap-Fill Exercise — Language Learning Contexts<\u002Ftitle>\n\n<style>\n  :root {\n    --bg: #f8f6f1;\n    --surface: #ffffff;\n    --ink: #1f1f1f;\n    --ink-soft: #555;\n    --ink-muted: #7a7a7a;\n    --border: #e5e2d8;\n    --border-strong: #d6d2c5;\n    --accent: #b85c2c;\n    --accent-soft: #fbeee5;\n    --correct: #1f8a5b;\n    --correct-soft: #e6f5ed;\n    --wrong: #c43d3d;\n    --wrong-soft: #fbeaea;\n    --hint: #8a6d2c;\n    --hint-soft: #fbf4dc;\n    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 14px rgba(0,0,0,0.04);\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);\n    font-family: \"Charter\", \"Iowan Old Style\", \"Source Serif Pro\", Georgia, \"Times New Roman\", serif;\n    font-size: 17px; line-height: 1.65; }\n  .page { max-width: 880px; margin: 0 auto; padding: 40px 28px 80px; }\n  header.intro { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }\n  header.intro p { margin: 6px 0; color: var(--ink-soft); font-size: 15px; }\n  .toolbar { position: sticky; top: 0; z-index: 20; background: rgba(248,246,241,0.92);\n    backdrop-filter: saturate(140%) blur(8px); -webkit-backdrop-filter: saturate(140%) blur(8px);\n    margin: 0 -28px 24px; padding: 12px 28px; border-bottom: 1px solid var(--border);\n    display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }\n  .toolbar .actions { display: flex; flex-wrap: wrap; gap: 8px; }\n  .toolbar .progress { font-size: 14px; color: var(--ink-soft); display: flex; align-items: center; gap: 12px; }\n  .progress-bar { width: 140px; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }\n  .progress-bar > span { display: block; height: 100%; width: 0%; background: var(--accent); transition: width .3s ease; }\n  button.btn { font: inherit; font-size: 14px;\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border-strong);\n    background: var(--surface); color: var(--ink); cursor: pointer; transition: all .15s ease; }\n  button.btn:hover { border-color: var(--accent); color: var(--accent); }\n  button.btn:active { transform: scale(0.98); }\n  button.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }\n  button.btn.primary:hover { background: #a04f24; border-color: #a04f24; color: #fff; }\n  button.btn.ghost { background: transparent; }\n\n  section.chapter { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;\n    padding: 26px 32px 30px; margin: 0 0 28px; box-shadow: var(--shadow); }\n  h1, h2, h3, h4, h5 { font-weight: 600; line-height: 1.3; letter-spacing: -0.005em; }\n  h1.chap-num { font-size: 16px; color: var(--accent); margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; }\n  h2.chap-title { font-size: 28px; margin: 0 0 18px; padding-bottom: 10px; border-bottom: 2px solid var(--accent); color: var(--ink); }\n  h3.section-h { font-size: 20px; margin: 26px 0 10px; color: var(--accent); text-transform: lowercase; font-variant: small-caps; letter-spacing: 0.02em; }\n  h4.section-h { font-size: 17px; margin: 20px 0 8px; color: var(--ink); text-transform: lowercase; font-variant: small-caps; letter-spacing: 0.02em; }\n  blockquote.epigraph { margin: 8px 0 4px; padding: 0 0 0 16px; border-left: 3px solid var(--accent-soft); color: var(--ink-soft); font-style: italic; font-size: 16px; }\n  p.epigraph-attr { margin: 4px 0 24px; color: var(--ink-muted); font-size: 14px; padding-left: 16px; }\n  p { margin: 12px 0; text-wrap: pretty; }\n  ul { margin: 8px 0 14px; padding-left: 22px; }\n  ul li { margin: 6px 0; }\n  strong { font-weight: 600; }\n  em { font-style: italic; }\n\n  aside.profile-box, aside.practice-box {\n    margin: 18px 0; padding: 16px 20px;\n    background: #f7f4ec; border: 1px solid var(--border); border-left: 4px solid var(--accent);\n    border-radius: 8px;\n  }\n  aside.practice-box { border-left-color: #2a6f9a; background: #eef4f8; }\n  aside.profile-box h5, aside.practice-box h5 {\n    margin: 0 0 8px; font-size: 14px; font-weight: 700;\n    text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent);\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  }\n  aside.practice-box h5 { color: #2a6f9a; }\n\n  figure.cartoon { margin: 20px auto; padding: 14px 14px 12px; background: #fffaf3; border: 1px solid var(--border); border-radius: 10px; text-align: center; max-width: 560px; }\n  figure.cartoon img { display: block; margin: 0 auto 10px; max-width: 100%; height: auto; }\n  figure.cartoon figcaption { font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; font-size: 13px; color: var(--ink-soft); text-align: left; padding: 0 6px; }\n  figure.cartoon figcaption strong { color: var(--ink); font-weight: 700; margin-right: 6px; }\n  aside.profile-box p, aside.practice-box p { margin: 0; }\n\n  .defbox { display: block; margin: 14px 0; padding: 12px 16px;\n    background: var(--hint-soft); border: 1px solid #ead9a0; border-radius: 8px; }\n  .defbox dt { display: inline; font-weight: 700; color: var(--ink); font-style: italic; }\n  .defbox dt::after { content: \" — \"; font-style: normal; font-weight: 400; color: var(--ink-muted); }\n  .defbox dd { display: inline; margin: 0; color: var(--ink-soft); }\n\n  .mcq { margin: 14px 0 16px; padding: 12px 16px; background: #fafaf6; border: 1px solid var(--border); border-radius: 8px; }\n  .mcq-q { margin: 0 0 8px; font-weight: 500; }\n  ol.mcq-opts { margin: 6px 0 4px 0; padding-left: 26px; font-size: 16px; }\n  ol.mcq-opts li { margin: 4px 0; }\n\n  .table-wrap { overflow-x: auto; margin: 14px 0; border: 1px solid var(--border); border-radius: 10px; }\n  table { border-collapse: collapse; width: 100%; font-size: 15px; }\n  table th, table td { border-bottom: 1px solid var(--border); padding: 10px 14px; text-align: left; vertical-align: top; }\n  table th { background: #f1ede2; font-weight: 600; }\n  table tr:last-child td { border-bottom: none; }\n\n  .gap-wrap { display: inline-flex; align-items: baseline; gap: 4px; white-space: nowrap; margin: 0 1px; }\n  .gap-input { font: inherit;\n    font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    font-size: 0.95em; width: 13ch; padding: 2px 8px; border: none;\n    border-bottom: 2px solid var(--accent); background: var(--accent-soft); color: var(--ink);\n    border-radius: 4px 4px 0 0; outline: none; transition: all .15s ease; }\n  .gap-input:focus { background: #fff; border-bottom-color: var(--accent); box-shadow: 0 2px 0 var(--accent); }\n  .gap-input.correct { background: var(--correct-soft); border-bottom-color: var(--correct); color: var(--correct); font-weight: 500; }\n  .gap-input.wrong { background: var(--wrong-soft); border-bottom-color: var(--wrong); color: var(--wrong); font-weight: 500; }\n  .gap-input.revealed { background: var(--hint-soft); border-bottom-color: var(--hint); color: var(--hint); font-weight: 500; font-style: italic; }\n  .gap-num { font-size: 0.78em; color: var(--ink-muted); font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; vertical-align: super; }\n  .gap-feedback { display: inline-flex; width: 16px; font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif; font-size: 0.85em; font-weight: 600; }\n  .gap-feedback.ok::before { content: \"\\2713\"; color: var(--correct); }\n  .gap-feedback.no::before { content: \"\\2717\"; color: var(--wrong); }\n  .gap-feedback.show::before { content: \"\\2605\"; color: var(--hint); }\n\n  .summary { display: none; margin: 14px 0 8px; padding: 12px 16px;\n    background: #f7f4ec; border: 1px solid var(--border); border-left: 4px solid var(--accent);\n    border-radius: 8px; font-size: 15px; }\n  .summary.show { display: block; }\n  .summary strong { color: var(--accent); }\n\n  @media print {\n    body { background: white; }\n    .toolbar { display: none; }\n    section.chapter { box-shadow: none; border: none; padding: 0; margin-bottom: 16px; page-break-inside: avoid; }\n    .gap-input { background: transparent; border-bottom: 1px solid #999; }\n  }\n  @media (max-width: 640px) {\n    .page { padding: 20px 16px 60px; }\n    section.chapter { padding: 20px 18px; }\n    .toolbar { margin: 0 -16px 16px; padding: 10px 16px; }\n    h2.chap-title { font-size: 22px; }\n    h3.section-h { font-size: 17px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n  <header class=\"intro\">\n    <p><strong>Gap-Fill Exercise — Language Learning Contexts<\u002Fstrong><\u002Fp>\n    <p><em>From: Hummel, K. M. (2014). Introducing Second Language Acquisition: Perspectives and Practices. Chapter 3.<\u002Fem><\u002Fp>\n    <p><strong>Instructions:<\u002Fstrong> Each numbered gap targets a key term or word from the chapter. Type the missing word in each input — press Enter or click out to check. Use the toolbar to check all answers, reveal them, or reset.<\u002Fp>\n  <\u002Fheader>\n\n  <div class=\"toolbar\" role=\"toolbar\" aria-label=\"Exercise controls\">\n    <div class=\"actions\">\n      <button class=\"btn primary\" id=\"btn-check-all\" type=\"button\">Check all answers<\u002Fbutton>\n      <button class=\"btn\" id=\"btn-reveal-all\" type=\"button\">Reveal all<\u002Fbutton>\n      <button class=\"btn ghost\" id=\"btn-reset-all\" type=\"button\">Reset<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"progress\" aria-live=\"polite\">\n      <span id=\"score-text\">0 / 49 correct<\u002Fspan>\n      <span class=\"progress-bar\"><span id=\"score-bar\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"summary-top\" class=\"summary\" role=\"status\" aria-live=\"polite\"><\u002Fdiv>\n\n  <section class=\"chapter\">\n    <h1 class=\"chap-num\">Chapter 3<\u002Fh1>\n    <h2 class=\"chap-title\">Language Learning Contexts<\u002Fh2>\n<h3 class=\"section-h\">3.0  chapter overview<\u002Fh3>\n<p>Learning a new language is a common occurrence on the world scale, but the circumstances in which a person undertakes to learn a new language vary enormously. Language learning situations can be as different as immersing oneself in a target language environment (as in traveling or living in another country), to receiving language instruction in a formal classroom for as little as an hour each week. This chapter will describe some of the common contexts in which a new language is learned.<\u002Fp>\n<h3 class=\"section-h\">3.1  naturalistic contexts<\u002Fh3>\n<p>Naturalistic contexts include situations such as when people move to another region or country where a new language is spoken. Adults recently settled in a new country may be confronted with the need to carry out daily activities in the new language. Children might be enrolled in a school where all the subject matter is taught through that language. Exposure to a new language in a new setting can result from a <span class=\"gap-wrap\" data-gap=\"1\" data-answer=\"deliberate\"><input type=\"text\" class=\"gap-input\" data-gap=\"1\" aria-label=\"Gap 1\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(1)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> choice to experience a new culture and language, as when students choose to study abroad during their university years, or from the desire to find new employment opportunities, as for immigrants moving to a new country. Finding oneself immersed in a new linguistic/cultural setting can also result less from a voluntary choice than from escape from a current situation that has become intolerable due to armed conflict, oppression, or poverty, to name just a few possible reasons.<\u002Fp>\n<h4 class=\"section-h\">3.1.1  immigration<\u002Fh4>\n<p>One common situation in which people find themselves immersed in a new language and culture is that of immigrants or refugees settling into a new country. Conflicts, civil wars, populations fleeing poverty, the desire to improve one’s economic situation, or a move to join relatives or friends are just a few reasons why individuals or entire families and communities may seek to move to another country where the language and traditions differ markedly from their native ones.<\u002Fp>\n<aside class=\"profile-box\"><h5>Profile: Immigration, Mila<\u002Fh5><p>Mila is a middle-aged woman from Bosnia, in East Europe, widowed, who moved with her two teenaged sons to Chicago, Illinois, in the 1990s during the Bosnian conflict. She had only a rudimentary grasp of English before immigrating, as did her two sons. On arrival, the three new immigrants enrolled in English as a second language courses at a local community center. After three months of daily language classes, the two sons were enrolled in the local public school system, where they took courses along with their native English-speaking classmates, as well as with immigrants from various other countries. For her part, Mila needed to learn the basics of English rapidly in order to carry out most of her daily activities, including shopping, banking, and social interactions outside her immediate family. Following the initial language course, Mila underwent training to become an assisted care provider, as her attempts to get a job in her previous professional field as a transportation dispatcher were not successful. On completion of the three months of training, she applied for various jobs in assisted care facilities for seniors, but her applications were usually rejected, sometimes with comments to the effect that her English skills were insufficient. When she did finally get a job in a care facility, she was dismissed after a few months when one of the elderly residents complained that her accent was too difficult to understand.<\u002Fp><\u002Faside>\n<p>Immigration to a region or country in which a new language needs to be mastered is often accompanied by numerous challenges, many of which go beyond those caused solely by issues related to language learning. In many cases, immigrants may have had little or no previous language instruction in the target language. Often the immigration process is accompanied by a certain economic <span class=\"gap-wrap\" data-gap=\"2\" data-answer=\"precariousness\"><input type=\"text\" class=\"gap-input\" data-gap=\"2\" aria-label=\"Gap 2\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(2)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>: Adult immigrants need to find employment, and their lack of language fluency along with difficulty in having their qualifications recognized in a new country can make it extremely difficult to find suitable work. They often have to resort to working in areas outside their areas of expertise, for instance in jobs requiring few advanced skills, at low pay, and during less than desirable hours. While immigrants can usually opt to receive language instruction, the need to find remunerated employment as quickly as possible can lead to short periods of time in language classes in order to begin earning a living as quickly as possible. The case of Mila is a clear example of the challenges faced by some new immigrants in their attempts to adapt to a new setting. Her language skills, or at least some peoples’ <span class=\"gap-wrap\" data-gap=\"3\" data-answer=\"perception\"><input type=\"text\" class=\"gap-input\" data-gap=\"3\" aria-label=\"Gap 3\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(3)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> of those skills, affected her employability and made her adjustment to the new society a difficult one. At the same time, her need to support herself and her family made it difficult to allot a significant amount of time to formal language learning instruction, which might have allowed her to better adapt to the work environment.<\u002Fp>\n<p>There have been a number of studies conducted on aspects related to L2 development in immigrant populations. For instance, one area of particular interest has been the relation between language skill and age of arrival in a given linguistic community. Generally speaking, most evidence (e.g., Oyama, 1976) suggests that early arrivals to a region or country, before the teenage years, tend to achieve native language speaker levels, but few individuals arriving after <span class=\"gap-wrap\" data-gap=\"4\" data-answer=\"puberty\"><input type=\"text\" class=\"gap-input\" data-gap=\"4\" aria-label=\"Gap 4\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(4)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>  manage to acquire the new language to native speaker levels. This is most evident in the area of pronunciation. We will examine the role of age in second language acquisition (SLA) in Chapter 7, which is devoted to this widely researched variable.<\u002Fp>\n<figure class=\"cartoon\"><img src=\"17871107-c901-426d-bea9-e9e9d2cb79dd\" alt=\"Cartoon 3.1 — English class for immigrants: a teacher tells a student 'I have tried telling you several times, my name is Ken and I am from Glasgow.'\"><figcaption><strong>Cartoon 3.1<\u002Fstrong>www.CartoonStock.com.<\u002Ffigcaption><\u002Ffigure>\n<p>The complex relationship between language, identity, and degree of personal investment in a new cultural community on the part of immigrants has been examined in a number of studies (Norton, 2000, 2001; Norton Peirce, 1995). In her research with immigrant women in Canada, Norton emphasizes that the immigrant’s investment in the target language is accompanied by an investment in the learner’s own identity. Norton Peirce (1995, p. 12) points out the need to explore “how relations of power in the social world affect social interaction between second language learners and target language speakers” and argues (1995, p. 12): “. . . more attention should be paid to how inequitable relations of power limit the opportunities L2 learners have to practice the target language outside the classroom.” She discusses the experiences of several recent immigrants to Canada which illustrate how power relations affect perceptions of language skill. In reporting diary recordings of a Czech immigrant to Canada (Norton Peirce, 1995, p. 21), one woman’s feelings of <span class=\"gap-wrap\" data-gap=\"5\" data-answer=\"inferiority\"><input type=\"text\" class=\"gap-input\" data-gap=\"5\" aria-label=\"Gap 5\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(5)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>   are revealed: “I feel uncomfortable using English in the group of people whose English language is their mother tongue because they speak fluently without any problems and I feel inferior.” Norton suggests a series of recommendations characterizing what she refers to as “classroom-based social research” that are particularly geared toward helping language learners in an immigrant situation cope with language learning challenges. For instance, learners are encouraged to reflect critically on how and when they interact with target language speakers in order to better understand factors affecting that interaction.<\u002Fp>\n<h4 class=\"section-h\">3.1.2  study abroad<\u002Fh4>\n<aside class=\"profile-box\"><h5>Profile: Study abroad, Steve<\u002Fh5><p>Steve is an example of a study abroad student. Steve is a student at a large, Midwestern university, majoring in Business Administration. In order to increase his future employability, Steve began taking university courses in Mandarin (Chinese). To make more rapid progress, Steve applied for a study abroad program that would allow him to attend Beijing University for his junior year. During his stay in Beijing, Steve discovered that living and trying to function on a day-to-day basis entirely in Mandarin was a sometimes exhausting and discouraging experience. He continued to study Mandarin in a course designed for foreigners at the university, and at the same time was enrolled in a Chinese literature and culture course given entirely in Mandarin. For the first two months, Steve struggled enormously to understand his teachers and to keep up with required reading. To his relief, three months into his stay he began to notice some <span class=\"gap-wrap\" data-gap=\"6\" data-answer=\"concrete\"><input type=\"text\" class=\"gap-input\" data-gap=\"6\" aria-label=\"Gap 6\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(6)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> progress, both in terms of his ability to understand what was being said and in his own ability to express his ideas in Mandarin. On his many outings into the shopping areas around his campus, he needed to repeat himself often, was frequently misunderstood, and resorted to paraphrases, gestures, and other communicative strategies to get his messages across. Still, he found himself increasingly able to carry on short conversations with fellow students or with shopkeepers and other local citizens when outside the university grounds.Julia, another study abroad student in Steve’s group in Beijing, had a quite different language learning experience. Julia decided to room with another US exchange student on the Beijing campus and spent much of her time socializing with the other exchange students. She enjoyed the familiarity and security of having fellow Americans to interact with and only ventured beyond the campus when <span class=\"gap-wrap\" data-gap=\"7\" data-answer=\"accompanied\"><input type=\"text\" class=\"gap-input\" data-gap=\"7\" aria-label=\"Gap 7\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(7)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> by a few of her US friends. She found that even after several months of attending Chinese classes, she still was largely unable to understand her teachers or Chinese students, and she had little success in making herself understood on the few occasions she tried to express herself outside the classroom, as when trying to order a meal in a restaurant. Thus, even though Julie was ostensibly involved in an immersion experience, her actual language contact was reduced to the language classroom, supplemented by occasional “real life” contacts with native speakers.<\u002Fp><\u002Faside>\n<p>A situation that aims at providing opportunities that approximate a naturalistic context for language learning is the study abroad experience, such as that described for Steve. University and even high school students are increasingly offered the opportunity to attend school or university in another country for all, or more commonly, part of their studies. An increasing amount of research has been published on the effects of study abroad experiences on language and cultural learning on the part of participants in such programs. Some evidence (e.g., Hernandez, 2010) reveals strong, positive effects on language <span class=\"gap-wrap\" data-gap=\"8\" data-answer=\"proficiency\"><input type=\"text\" class=\"gap-input\" data-gap=\"8\" aria-label=\"Gap 8\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(8)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>, while other studies (Diaz-Campos, 2004; Freed, 1995; Longcope, 2003) paint a more nuanced picture, pointing out that positive effects are associated with particular types and degrees of implication in the target language environment. In this regard, in the previous profile box, we noted the differences between Steve and Julia: Steve took advantage of many interactive opportunities to use his Mandarin, while his classmate, Julia, tended to remain with her fellow Americans.<\u002Fp>\n<p>Positive effects on L2 speaking were found in a study of 20 students involved in a one-semester study abroad program in Spain (Hernandez, 2010). The study also revealed that interactions with the local culture were linked with students’ integrative motivation, or their desire to feel a part of the local community. Isabelli-Garcia (2003) studied oral communication skill development in three US study abroad students over their five-month stay in Argentina. She found increases in the mean number of words per <span class=\"gap-wrap\" data-gap=\"9\" data-answer=\"response\"><input type=\"text\" class=\"gap-input\" data-gap=\"9\" aria-label=\"Gap 9\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(9)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>, fewer pauses, and fewer difficulties in producing the target language by the end of the stay. However, only one of the three students revealed an increase in frequency of advanced oral functions (narration and description).<\u002Fp>\n<p>On the other hand, another study (Freed, 1995), comparing the experience of students studying for one semester in France with similar students studying intensive French at their US university, failed to find any significant differences on a number of speech production measures, until pre-<span class=\"gap-wrap\" data-gap=\"10\" data-answer=\"experiment\"><input type=\"text\" class=\"gap-input\" data-gap=\"10\" aria-label=\"Gap 10\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(10)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> levels of target language proficiency were taken into account. Once this was done, moderate differences in favor of the study abroad group were found with regard to fluency measures (rate of speech, etc.) for students whose French skills were less advanced at the outset. In other words, for students who were already fairly advanced in their French proficiency the study abroad experience appeared not to have strong effects on various language skills compared to the “at home” group.<\u002Fp>\n<p>In further research (Freed, Segalowitz, &amp; Dewey, 2004) learners of French were compared across three different contexts: “at home” formal language classrooms, “at home” summer intensive immersion classrooms, and study abroad in France. In this study, it was actually “at home” <span class=\"gap-wrap\" data-gap=\"11\" data-answer=\"intensive\"><input type=\"text\" class=\"gap-input\" data-gap=\"11\" aria-label=\"Gap 11\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(11)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> immersion students who made the most gains in oral fluency compared to the study abroad group, while the formal language classroom learners made the fewest gains. The authors of that study suggest that the important, determining factors are the type and intensity of contact rather than solely type of context (immersion vs study abroad), given that immersion students’ greater gains appeared to be due to the fact that they were required to speak and write more than the study abroad group.<\u002Fp>\n<p>In a study carried out with Japanese high school students (Yashima &amp; Zenuk-Nishide, 2008), results revealed that a study abroad group, compared to two different “stay at home” groups, scored higher on all measures: TOEFL (Test of English as a Foreign Language) scores, willingness to communicate in the L2, and frequency of communication. However, one of the “at home” groups studied English more intensively than the other group and in a way that emphasized interactions with the international English-speaking community; results revealed this group had a <span class=\"gap-wrap\" data-gap=\"12\" data-answer=\"developmental\"><input type=\"text\" class=\"gap-input\" data-gap=\"12\" aria-label=\"Gap 12\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(12)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> profile similar to that of the study abroad group, indicating that to some extent, important features of a study abroad experience can be replicated in an instructional setting.<\u002Fp>\n<p>Kinginger (2008) carried out a study of 24 American students studying abroad in France during a spring session, and further analyzed the case histories of six of these individuals. Her study revealed that while students generally improved on L2 and language-related measures, there was also much individual <span class=\"gap-wrap\" data-gap=\"13\" data-answer=\"variation\"><input type=\"text\" class=\"gap-input\" data-gap=\"13\" aria-label=\"Gap 13\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(13)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>. The study suggests the quality of students’ experiences was related to language development, but that students’ personal views toward their experiences also played a critical role.<\u002Fp>\n<p>Kinginger’s (2008) study, as well as the experiences of Steve and Julia described at the outset of this section, demonstrate that simply participating in a study abroad program is not enough to ensure substantial immersion in the target language and its culture. Study abroad participants (e.g., Julia’s experience) may be tempted to socialize primarily with their <span class=\"gap-wrap\" data-gap=\"14\" data-answer=\"compatriots\"><input type=\"text\" class=\"gap-input\" data-gap=\"14\" aria-label=\"Gap 14\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(14)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> and, despite living in the target language environment, may restrict themselves to only limited interactions in the L2. To get the full benefit from a study abroad program, participants may need encouragement to go beyond their “comfort zone” and make the extra effort to get involved with native speakers in the local environment.<\u002Fp>\n<p>In addition, Kinginger (2011, p. 68) emphasizes the need for students to prepare adequately for study abroad experiences, including taking advantage of computer-based technology that has become so readily <span class=\"gap-wrap\" data-gap=\"15\" data-answer=\"accessible\"><input type=\"text\" class=\"gap-input\" data-gap=\"15\" aria-label=\"Gap 15\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(15)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in today’s world: “telecollaborative exchanges provide a sheltered opportunity to participate in socially consequential interactions, discover the social significance of linguistic choices, and begin crafting an appropriate foreign-language-mediated identity.” If Steve’s classmate Julia had had such opportunities before her stay in China, perhaps she would have felt better prepared to initiate conversations with her Chinese peers.<\u002Fp>\n<h3 class=\"section-h\">3.2  instructed learning<\u002Fh3>\n<p>In instructed learning, the learning of a new language might be restricted to a few hours weekly in the context of a language classroom for people who wish to pick up a few key phrases in the language of a country they plan to visit. On the other hand, it can also entail more substantial, <span class=\"gap-wrap\" data-gap=\"16\" data-answer=\"ongoing\"><input type=\"text\" class=\"gap-input\" data-gap=\"16\" aria-label=\"Gap 16\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(16)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> language exposure, as is the case in many elementary and secondary school classrooms. Exposure to the target language can also be the sole language used in the classroom for significant periods, as in immersion-type instructional settings. We will examine these various types of instructed learning situations in this section.<\u002Fp>\n<figure class=\"cartoon\"><img src=\"4ac2be16-248f-48ad-a82b-362ef75d6327\" alt=\"Cartoon 3.2 — Night school enrolment: three students at desks labelled 'Learn French', 'Learn German', and 'Learn text message.'\"><figcaption><strong>Cartoon 3.2<\u002Fstrong>www.CartoonStock.com.<\u002Ffigcaption><\u002Ffigure>\n<h4 class=\"section-h\">3.2.1  traditional classroom instruction<\u002Fh4>\n<aside class=\"profile-box\"><h5>Profile: Traditional classroom instruction, Linda<\u002Fh5><p>Linda, a teacher in an elementary school in Boston, was planning a trip to Italy to indulge her passion for opera and her desire to tour Tuscany. Although she had a busy schedule working full time, she managed to squeeze in an hour per week every Friday evening to attend a beginner’s Italian course at her local community college. Her Italian course concentrated on teaching students how to communicate and understand simple sentences, with little attention to reading and writing skills. Some class time was <span class=\"gap-wrap\" data-gap=\"17\" data-answer=\"devoted\"><input type=\"text\" class=\"gap-input\" data-gap=\"17\" aria-label=\"Gap 17\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(17)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> to introducing basic grammatical patterns to students. Linda enjoyed the time spent learning Italian but, even after several months of the weekly sessions, felt that she had made little visible progress and began making concrete plans for a trip abroad.<\u002Fp><\u002Faside>\n<p>Linda has limited contact with the second language. Classroom learning in school settings or in adult education contexts is typically limited in time and exposure. An hour or a couple of hours a week is very little <span class=\"gap-wrap\" data-gap=\"18\" data-answer=\"exposure\"><input type=\"text\" class=\"gap-input\" data-gap=\"18\" aria-label=\"Gap 18\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(18)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> compared to what the child is exposed to when learning a first language, or compared to an immersion experience in which the target language is used substantially throughout the day. Linda only used her L2 during her weekly classroom activities, and the occasional practice she initiated on her own.<\u002Fp>\n<p>Substantial research has been carried out on various aspects of L2 classroom learning. Instructional issues related to classroom learning along with some of the major teaching methods that have been <span class=\"gap-wrap\" data-gap=\"19\" data-answer=\"implemented\"><input type=\"text\" class=\"gap-input\" data-gap=\"19\" aria-label=\"Gap 19\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(19)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in language classrooms will be described in Chapter 5. The development of learner language in general will be discussed in Chapter 6.<\u002Fp>\n<p>One distinction made in regard to traditional language teaching in school settings in the US is between foreign language experience or exploratory (FLEX) and foreign language in the elementary school (FLES) program types. As suggested by its description, an exploratory program aims at offering general exposure to a language and culture, and proficiency in the target language is not a primary goal. A primary objective of a FLEX program is to enhance interest in further learning and openness to the target language and culture. On the other hand, a FLES program emphasizes the teaching of the four skills: listening, speaking, reading and writing, along with introducing aspects of the foreign language culture, and an important aim is to help children achieve a level of proficiency in the target language. Another characteristic of FLES programs is sequencing of skills: an <span class=\"gap-wrap\" data-gap=\"20\" data-answer=\"initial\"><input type=\"text\" class=\"gap-input\" data-gap=\"20\" aria-label=\"Gap 20\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(20)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> emphasis is put on development of oral comprehension (listening) and speaking, followed by reading and writing skill development.<\u002Fp>\n<aside class=\"practice-box\"><h5>Language learning in practice: Foreign language education in the US<\u002Fh5><p>In a 2008 survey on foreign language education at the elementary and secondary level in the US, carried out by the Center for Applied Linguistics (Rhodes &amp; Pufahl, 2009), it was reported that compared to earlier survey results (1997), while numbers remained stable at the high school level, the percentage of schools offering foreign language <span class=\"gap-wrap\" data-gap=\"21\" data-answer=\"instruction\"><input type=\"text\" class=\"gap-input\" data-gap=\"21\" aria-label=\"Gap 21\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(21)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> decreased from 31% to 25% for elementary schools and from 75% to 58% for middle schools. The survey also reported that French and German teaching declined at both elementary and high school levels, but the teaching of Spanish increased (79% to 88% of schools) at the elementary level, and remained stable (93%) at the high school level. As for type of instruction, a basic introductory exposure to the language was most common at the elementary level (47% of public schools), while the more focused FLES programs teaching the four skills characterized close to 40% of public elementary schools with language programs. Immersion-type instruction was offered at the remaining approximately 14% of schools. For high schools, traditional language classes in the four skills was the most common instructional type (95%).<\u002Fp><\u002Faside>\n<h4 class=\"section-h\">3.2.2  bilingual education<\u002Fh4>\n<figure class=\"cartoon\"><img src=\"67adf65b-5115-4817-8e49-8d85768e0ab0\" alt=\"Cartoon 3.3 — An alien family asks a man, 'We're thinking of settling down here — do you folks have bilingual education?'\"><figcaption><strong>Cartoon 3.3<\u002Fstrong>www.CartoonStock.com.<\u002Ffigcaption><\u002Ffigure>\n<div class=\"defbox\"><dt>bilingual education<\u002Fdt><dd>Schooling in two languages.<\u002Fdd><\u002Fdiv>\n<aside class=\"profile-box\"><h5>Profile: Bilingual education, Alberto<\u002Fh5><p>Alberto was born in the San Diego metropolitan area in Southern California, to parents who emigrated from the Tabasco region in Mexico before he was born. Alberto grew up exposed to Spanish at home and among his community, and attended a transitional bilingual education program from kindergarten. Bilingual education is the term that has traditionally been used in the US context to refer to the education of minority language students <span class=\"gap-wrap\" data-gap=\"22\" data-answer=\"partially\"><input type=\"text\" class=\"gap-input\" data-gap=\"22\" aria-label=\"Gap 22\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(22)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in their L1 and partially in the language of the majority, English. Alberto speaks Spanish well, but throughout his schooling the time allotted to teaching Spanish skills was reduced over the years, with an increasing proportion of time being given to the teaching of English as a second language. As a result, Alberto lacked strong literacy skills in Spanish and performed only below average in his English classes throughout high school.<\u002Fp><\u002Faside>\n<p>Bilingual education programs similar to Alberto’s experience are found throughout the US, and are particularly common in certain regions with large numbers of recent immigrants. For instance, numerous bilingual education programs are in effect in California, in which Spanish-speaking students receive classroom instruction in Spanish and in English, in varying <span class=\"gap-wrap\" data-gap=\"23\" data-answer=\"proportions\"><input type=\"text\" class=\"gap-input\" data-gap=\"23\" aria-label=\"Gap 23\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(23)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>. Variations of bilingual education are also found in many countries outside the North American context.<\u002Fp>\n<p>There are differences in how bilingual education programs are implemented in schools. Some programs, like Alberto’s experience described in the preceding profile, are primarily <span class=\"gap-wrap\" data-gap=\"24\" data-answer=\"transitional\"><input type=\"text\" class=\"gap-input\" data-gap=\"24\" aria-label=\"Gap 24\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(24)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in nature, in which the emphasis is on providing initial instruction in the students’ L1, Spanish in Alberto’s case, accompanied by some instruction in English. Over time, increasing instruction time for academic subjects is given to English. Ultimately, students in transitional programs are geared toward reaching high proficiency in English, with less consideration given to the maintenance or development of their native language. It has been suggested that such programs lead to subtractive bilingualism, in which proficiency in the majority language is gained at the expense of maintenance of the native language of minority language speakers. The term “language minority” or “minority language” refers to individuals whose L1 is not the main language spoken in the wider community.<\u002Fp>\n<div class=\"defbox\"><dt>subtractive bilingualism<\u002Fdt><dd>A language learning situation in which the majority language is learned at the expense of the native language of minority language speakers.<\u002Fdd><\u002Fdiv>\n<p>Another type of bilingual education program, a developmental bilingual program, is more oriented toward reaching proficiency in both languages. Here, minority language students are given intensive exposure to their native language and at the same time receive some instruction in English. Classroom exposure to their native language and English continues throughout the school years. A variation on the theme of developmental bilingual programs, <span class=\"gap-wrap\" data-gap=\"25\" data-answer=\"dual\"><input type=\"text\" class=\"gap-input\" data-gap=\"25\" aria-label=\"Gap 25\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(25)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> language instruction, aimed at both minority and majority language speakers will be discussed later in this chapter.<\u002Fp>\n<p>Bilingual education programs have generated heated debate in communities across the United States. Those opposed to such programs argue that minority language children need to adapt rapidly to learning the language of the majority and that support to the native language will only slow this process. Proponents of bilingual education, in contrast, argue that the child’s native language needs to be supported and valued in the school context in order for children to thrive in the academic setting. Research has generally demonstrated that developmental-type bilingual education programs lead to <span class=\"gap-wrap\" data-gap=\"26\" data-answer=\"superior\"><input type=\"text\" class=\"gap-input\" data-gap=\"26\" aria-label=\"Gap 26\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(26)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> results in English proficiency compared to transitional programs (Lindholm-Leary, 2001; Thomas &amp; Collier, 2002).<\u002Fp>\n<p>Ramirez (1992) carried out a major four-year longitudinal study that focused on language minority children’s academic achievement. This study examined a variety of bilingual education program types and found that students in programs where they received longer support for their primary language, or L1, (sometimes called “late-exit” programs and contrasted with “early-exit” programs) performed better on standardized English achievement tests than students in transitional programs where there was less support for the L1. Similar results were found by Collier (1992) in her synthesis of the existing research. In addition, Ramirez (1992) also reported that by Grade 6, students receiving Spanish L1 support over a longer period made more improvement in math scores compared to students receiving more exposure to English, despite similar math scores across both groups at the beginning of their schooling in Grade 1. A general consensus from such research is summed up by Collier (1992, p. 205): “. . . the greater the amount of L1 <span class=\"gap-wrap\" data-gap=\"27\" data-answer=\"instructional\"><input type=\"text\" class=\"gap-input\" data-gap=\"27\" aria-label=\"Gap 27\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(27)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> support for language minority students, combined with balanced L2 support, the higher they are able to achieve academically in L2 in each succeeding academic year, in comparison to matched groups being schooled monolingually in L2.”<\u002Fp>\n<p>A more recent longitudinal study (Thomas &amp; Collier, 2002) examining language minority students in five school districts in the US found that after four to seven years of bilingual education, students outperformed those studying in schools with only one language of instruction, and did so in all subjects. They also found that the most important factor in achieving L2 proficiency was the amount of instruction in the L1.<\u002Fp>\n<p>It appears that <span class=\"gap-wrap\" data-gap=\"28\" data-answer=\"substantial\"><input type=\"text\" class=\"gap-input\" data-gap=\"28\" aria-label=\"Gap 28\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(28)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> use and support for the L1 not only does not limit L2 proficiency for minority language children schooled in developmental-type bilingual education programs, but the validation given to the home language actually leads to more proficient target language skill and can also lead to higher general academic achievement.<\u002Fp>\n<h4 class=\"section-h\">3.2.3  immersion instruction<\u002Fh4>\n<div class=\"defbox\"><dt>immersion education or instruction<\u002Fdt><dd>A form of bilingual education in which students are taught through the medium of a second language, along with some instruction through their L1.<\u002Fdd><\u002Fdiv>\n<aside class=\"profile-box\"><h5>Profile: English immersion in Hong Kong, Xia Mei<\u002Fh5><p>Xia Mei is a high school student who has just begun studying in an English immersion program in Hong Kong in which immersion instruction starts in the first year of high school (Grade 7). She previously has taken English courses, not in an immersion setting, for six years in elementary school. Xia Mei has few occasions to use English outside school, although she <span class=\"gap-wrap\" data-gap=\"29\" data-answer=\"occasionally\"><input type=\"text\" class=\"gap-input\" data-gap=\"29\" aria-label=\"Gap 29\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(29)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> watches TV in English and uses the Internet in English. Her native language is Cantonese and she is also able to speak some Mandarin, widely spoken across mainland China. She finds studying academic courses through English to be quite a challenge, as her teacher provides little explicit support for language skills as might be needed to understand abstract scientific concepts. Still, she knows she will need to have a strong background in English to get a better job in the future, so she is strongly motivated to succeed. Her parents are similarly <span class=\"gap-wrap\" data-gap=\"30\" data-answer=\"determined\"><input type=\"text\" class=\"gap-input\" data-gap=\"30\" aria-label=\"Gap 30\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(30)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> that she strive to achieve strong language skills in English.<\u002Fp><\u002Faside>\n<p>In addition to substantial exposure to the target language as in the case of immigration to a new region or country, immersion-type learning situations are often constructed within a school setting, at the elementary or high school level, as was the case for Xia Mei in Hong Kong. Immersion education or immersion instruction is considered as “a form of bilingual education in which students who speak the language of the majority of the population receive part of their instruction through the medium of a second language and part through their first language” (Genesee, 1987, p. 1). The distinguishing feature of immersion instruction is that school subjects such as history and science are <span class=\"gap-wrap\" data-gap=\"31\" data-answer=\"conducted\"><input type=\"text\" class=\"gap-input\" data-gap=\"31\" aria-label=\"Gap 31\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(31)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in the target language. For instance, in Canada, an officially bilingual (English and French) country, immersion settings are found in numerous Canadian communities where English-speaking parents send their children to French immersion classes. The immersion system can be set up as “early” immersion in which the L2 is taught from the earliest years (kindergarten or Grade 1), or “late” immersion in which content course instruction in the L2 may only begin in Grade 4. Other variations include “<span class=\"gap-wrap\" data-gap=\"32\" data-answer=\"partial\"><input type=\"text\" class=\"gap-input\" data-gap=\"32\" aria-label=\"Gap 32\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(32)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>” in which only some of the content courses are taught through the L2, or “full” in which all courses are so taught. In general, however, approximately 50% of instruction should be provided through the L2 in order for a given program to qualify as “immersion.” According to Canadian estimates, early immersion is considered to consist of approximately 6000–7000 hours of contact with the target language, late immersion 3500 hours, while traditional second language courses consist of approximately 1000 hours (Netten &amp; Germain, 2004).<\u002Fp>\n<figure class=\"cartoon\"><img src=\"65821964-3d5c-49a2-b911-954e2120beca\" alt=\"Cartoon 3.4 — 'Just Kidding': a child has chosen the wrong restroom door, labelled in French — 'Garth's first day in French Immersion.'\"><figcaption><strong>Cartoon 3.4<\u002Fstrong>Just Kidding by Rod Maclean. © 2002. www.justkiddingcartoons.com.<\u002Ffigcaption><\u002Ffigure>\n<p>Canadian immersion programs were first introduced in the French-speaking province of Quebec in the mid-1960s by English language schools, as a result of strong support from parents wanting their children to learn French as efficiently as possible. The Montreal suburb of St. Lambert was the <span class=\"gap-wrap\" data-gap=\"33\" data-answer=\"locus\"><input type=\"text\" class=\"gap-input\" data-gap=\"33\" aria-label=\"Gap 33\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(33)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> of the first official immersion program in that province in 1965 (Lambert &amp; Tucker, 1972). In the US, a form of immersion instruction was first introduced in Culver City, California, in 1971.<\u002Fp>\n<p>There is abundant literature reporting research on the various outcomes of immersion programs, in particular among those in various Canadian settings. A number of studies attest to the overall effectiveness of immersion programs (Fortune &amp; Tedick, 2008; Genesee, 2004). In the Canadian context, with regard to L1 skills (English), students in early total immersion programs who are first entirely taught through their second language, French, tend to lag behind students enrolled in all-English schools, particularly in skills related to literacy skills, such as reading, writing and spelling, until they begin to receive English language arts instruction, at which point they achieve results similar to those in regular programs (Genesee, 1983; Swain, 1975; Swain &amp; Lapkin, 1982). As for academic achievement, studies report immersion students, whether in an early or late immersion format, do not lag behind students in regular school programs when tested on standardized tests or on locally developed subject-matter achievement tests (Barik, Swain, &amp; Gaudino, 1975; Genesee, 1983; Swain, 1978). In a study examining L1 reading achievement based on year 2000 data (Allen, 2004), even when gender, socioeconomic background and parental education were taken into account, French immersion students in Canada were found to outperform their peers in non-immersion programs in all but one province, and even for that one province results were <span class=\"gap-wrap\" data-gap=\"34\" data-answer=\"identical\"><input type=\"text\" class=\"gap-input\" data-gap=\"34\" aria-label=\"Gap 34\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(34)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> across immersion and non-immersion students.<\u002Fp>\n<p>On the other hand, one area in which immersion students lag behind native speaking students is in expressive skills, i.e., writing and speaking (e.g., Genesee, 1987; Harley, Allen, Cummins, &amp; Swain, 1990). This gap between receptive and expressive skills in the target language may be <span class=\"gap-wrap\" data-gap=\"35\" data-answer=\"attributed\"><input type=\"text\" class=\"gap-input\" data-gap=\"35\" aria-label=\"Gap 35\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(35)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> to the few opportunities to interact with native speakers outside the classroom in many immersion program contexts. When students are studying in a traditional immersion program, their only native speaker model may be the teacher, while they are widely exposed to non-native-like pronunciations on the part of their fellow classmates. Still, it has been pointed out (e.g., Genesee, 1987) that immersion students, in particular those who begin in early-start programs, generally reach levels of functional proficiency in the target language, meaning that while they may not have native-like proficiency, they are still able to understand the language and express themselves in most interpersonal as well as academic contexts.<\u002Fp>\n<p>Another immersion setting that has been explored is the teaching of Irish in Ireland. English is the language of the majority in Ireland, but Irish is taught as a primary school subject throughout the country; however, in 2000, it was estimated that only 7% of primary schools taught Irish through immersion (Murtagh, 2007). One study (Murtagh, 2007) involving 95 students from several different high school classes in various schools across Dublin, the capital of Ireland, found that immersion students, compared to more traditionally taught students, scored highest in terms of L2 proficiency, motivation and L2 use. This study found that the main <span class=\"gap-wrap\" data-gap=\"36\" data-answer=\"impediments\"><input type=\"text\" class=\"gap-input\" data-gap=\"36\" aria-label=\"Gap 36\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(36)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> to speaking proficiency on the part of mainstream (non-immersion) classroom students were the limited instruction time in Irish and few opportunities to use Irish outside the classroom.<\u002Fp>\n<p>A general term for language teaching that includes instruction of disciplinary subjects through the target language is Content Based Instruction (CBI). In the European context, a similar format is called “Content and Language Integrated Learning” (CLIL). There are variations in how CLIL is <span class=\"gap-wrap\" data-gap=\"37\" data-answer=\"implemented\"><input type=\"text\" class=\"gap-input\" data-gap=\"37\" aria-label=\"Gap 37\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(37)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>, but in this format some content courses are taught through the target language, along with explicit teaching of the target language (Baker, 2011).<\u002Fp>\n<aside class=\"practice-box\"><h5>Language learning in practice: Example of immersion instruction—English in China<\u002Fh5><p>An interesting example of early immersion in English is found in China in the Xi Dian Experimental Primary School, situated in Xi’an, the capital city of Shaanxi province.Immersion programs are fairly new in China, where more traditional instruction has prevailed in which teacher-centered activities have been the norm. In contrast to traditional teaching, immersion classes tend to put a strong emphasis on learner-centered exercises and activities. Students are encouraged to <span class=\"gap-wrap\" data-gap=\"38\" data-answer=\"participate\"><input type=\"text\" class=\"gap-input\" data-gap=\"38\" aria-label=\"Gap 38\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(38)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> actively, using the target language as much as possible in the classroom.In 2005, Xi Dian School began with two immersion classes at Grade 1, as part of a larger collaborative immersion project between China, Canada, and the US. The project has since expanded throughout China and includes as many as 20 kindergartens, 17 primary schools, and four middle schools in Xi’an and other cities in China (Kong, 2008). Xi Dian offers partial immersion in science, moral education and “<span class=\"gap-wrap\" data-gap=\"39\" data-answer=\"integrated\"><input type=\"text\" class=\"gap-input\" data-gap=\"39\" aria-label=\"Gap 39\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(39)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> English,” in which English is used to teach music, art and physical education. The L1 of students, i.e., Chinese, and Chinese literacy, are taught from Grade 1. As of 2008, Xi Dian offered a total of eight immersion classes: three classes at Grade 1, three classes at Grade 2, and two classes at Grade 3. It aims at eventually offering immersion up to Grade 6 for more than 800 students.<\u002Fp><\u002Faside>\n<h4 class=\"section-h\">3.2.4  dual language instruction<\u002Fh4>\n<div class=\"defbox\"><dt>dual language instruction<\u002Fdt><dd>Language education in which children who are native speakers from each of the target language communities, both majority and minority language speakers, share the classroom.<\u002Fdd><\u002Fdiv>\n<p>Dual language instruction, also referred to as dual immersion, two-way immersion (TWI), bilingual immersion, dual language immersion, two-way bilingual immersion, two-way bilingual education, or development bilingual education (DBE), is another variation on the theme of immersion. In this case, the language of instruction varies between two languages. A <span class=\"gap-wrap\" data-gap=\"40\" data-answer=\"distinguishing\"><input type=\"text\" class=\"gap-input\" data-gap=\"40\" aria-label=\"Gap 40\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(40)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> feature of these programs is that children who are native speakers from each of the target language communities, both majority language speakers and minority language speakers, share the classroom. The proportion of each language is considered to ideally consist of 50% of each, and it is considered essential that each language group <span class=\"gap-wrap\" data-gap=\"41\" data-answer=\"constitutes\"><input type=\"text\" class=\"gap-input\" data-gap=\"41\" aria-label=\"Gap 41\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(41)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> at least one-third of the group. A major goal of these programs is to allow children from both language backgrounds to learn together and to learn from each other, while learning to value each language and its cultural heritage.<\u002Fp>\n<p>In a number of schools in communities in the US where native speakers of languages such as Spanish and English reside, native speakers of both languages comprise dual language classrooms. Other pairs of languages found in dual language programs in the US include English and Korean, English and Mandarin Chinese, and English and Navajo, to give just a few examples.<\u002Fp>\n<p>A recent directory compilation carried out by the Center for Applied Linguistics (CAL) in the United States listed 372 TWI programs in 28 states (http://www.cal.org/twi/directory accessed on October 18, 2013). One of the important criteria for inclusion in the CAL’s directory is that content and <span class=\"gap-wrap\" data-gap=\"42\" data-answer=\"literacy\"><input type=\"text\" class=\"gap-input\" data-gap=\"42\" aria-label=\"Gap 42\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(42)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> instruction in the minority language consist of at least 50% of the instructional day at all grade levels. In addition, students from each language group share the classroom for at least 60% of instruction time at all grade levels.<\u002Fp>\n<p>The first two-way bilingual education program in North America was reportedly developed by Cuban exile parents in Dade County, Miami, Florida, at Coral Way Elementary School. The format developed there was to bring together Spanish speakers learning English as a second language together in the same classrooms as English-speaking children learning Spanish. As mentioned previously, in the dual language model, both languages are used throughout the day to teach various subjects to a <span class=\"gap-wrap\" data-gap=\"43\" data-answer=\"linguistically\"><input type=\"text\" class=\"gap-input\" data-gap=\"43\" aria-label=\"Gap 43\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(43)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> -diverse group of students.<\u002Fp>\n<p>Green Bay, Wisconsin is another example of a community with a dual language school program. In one of its elementary schools, Danz Elementary School, two-way classrooms consist of half native English and half native Spanish speakers. Classroom instruction is given in both languages, divided evenly. Each group also receives <span class=\"gap-wrap\" data-gap=\"44\" data-answer=\"separate\"><input type=\"text\" class=\"gap-input\" data-gap=\"44\" aria-label=\"Gap 44\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(44)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> instruction in the target language (e.g., English as a second language, for the Spanish speakers) and both groups receive native language literacy instruction as well. Otherwise, basic academic courses (science, math, social studies) are taught one day in English and the next in Spanish.<\u002Fp>\n<p>Similar to findings from immersion program studies, dual language program research reveals that students tend to catch up with their peers in regular programs after the early primary years (Lindholm-Leary &amp; Borsato, 2006; Lindholm-Leary &amp; Howard, 2008). After four to seven years in a dual language program, students have been found to outperform their peers in regular programs (Thomas &amp; Collier, 2002). In a study of 732 elementary school students (Lindholm-Leary &amp; Hernandez, 2011), Latino students in dual language programs were found to achieve at higher levels than their peers in <span class=\"gap-wrap\" data-gap=\"45\" data-answer=\"mainstream\"><input type=\"text\" class=\"gap-input\" data-gap=\"45\" aria-label=\"Gap 45\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(45)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> English classes, with the subgroup of students originally classified as “English language learners” but having become proficient in English outperforming other Latino subgroups (native English speakers and current English language learners) in both English and Spanish.<\u002Fp>\n<div class=\"defbox\"><dt>additive bilingualism<\u002Fdt><dd>Language learning situation in which learning a second language is not at the expense of development of the L1; both languages are supported and valued.<\u002Fdd><\u002Fdiv>\n<p>An important concept in dual language programs, as in other L2 teaching formats, is the notion of additive bilingualism, additive in the sense that a language is added without detrimental effects to the native language. (Note that we will discuss bilingualism further in Chapter 9.) Such additive programs have been linked with high rates of achievement in content areas as well as with high levels of L1 and L2 proficiency (e.g., Lindholm-Leary, 2001; Ramirez, 1992; Thomas &amp; Collier, 2002). Other important aspects found as results of dual language instruction are greater self-esteem and improved attitudes toward other cultural communities on the part of students (Cazabon, Nicoladis, &amp; Lambert, 1998; Lindholm-Leary, 2001; Lindholm-Leary &amp; Borsato, 2001), as well as more positive attitudes toward academic subjects (Lindholm-Leary &amp; Borsato, 2005).<\u002Fp>\n<h4 class=\"section-h\">3.2.5  heritage language instruction<\u002Fh4>\n<div class=\"defbox\"><dt>heritage language<\u002Fdt><dd>A language acquired by individuals raised in homes where a dominant language in the larger society, such as English in the US, is not spoken or is not exclusively spoken.<\u002Fdd><\u002Fdiv>\n<aside class=\"profile-box\"><h5>Profile: Heritage language learner, Walid<\u002Fh5><p>Walid grew up in the Dearborn area of Detroit, Michigan, in a family originating from Lebanon in the Middle East. Walid grew up speaking Lebanese Arabic in the family, but he attended English language schools in his community. Due to his schooling in English and little outside school reading or writing practice in Arabic he lacks literacy skills in his heritage language. When Walid finished high school and went on to study at a local community college, since he felt limited by his inability to read and write <span class=\"gap-wrap\" data-gap=\"46\" data-answer=\"fluently\"><input type=\"text\" class=\"gap-input\" data-gap=\"46\" aria-label=\"Gap 46\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(46)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> in Arabic, he decided to enroll in an Arabic course offered to heritage language speakers. In his class, Walid discovered students with similar linguistic backgrounds and experiences to his, although there was also a wide variation in literacy and oral skills on the part of the students. Some students had been raised in homes in which they were encouraged to speak English most of the time, and their oral fluency in Arabic was limited, although many of them had good comprehension skills. Most students, like Walid, were similar in lacking strong literacy skills in Arabic.<\u002Fp><\u002Faside>\n<p>Heritage language instruction is another type of language classroom in which learners, like Walid, are taught a language that is spoken in the home or among members of their ethnic group. In a widely accepted definition by Valdés (2000), a heritage language is a language acquired by individuals raised in homes where a <span class=\"gap-wrap\" data-gap=\"47\" data-answer=\"dominant\"><input type=\"text\" class=\"gap-input\" data-gap=\"47\" aria-label=\"Gap 47\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(47)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> language in the larger society, such as English in the United States, is not spoken or is not exclusively spoken (note that Alberto, introduced earlier, can also be considered to be a heritage language learner). Other terms used for “heritage language” include “community language,” “home language,” and “ancestral language.” Polinsky and Kagan (2007, pp. 369–370) point out: “The crucial criterion is that the heritage language was first in the order of acquisition but was not completely acquired because of the individual’s switch to another dominant language.” The “heritage” label signals there is a particular family relevance to the learner (Fishman, 2001).<\u002Fp>\n<p>Heritage language instruction can take var
