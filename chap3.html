ious forms, including instruction in public schools, or language courses organized by the local ethnolinguistic community after regular school hours or on weekends.<\u002Fp>\n<p>There are a number of important issues related to the study of heritage languages. One typical problem is that of speakers who appear not to have fully acquired aspects of the heritage language. For instance, Silva-Corvalán (1994, 2003) found that young children from Spanish-speaking backgrounds in Los Angeles, California, had only partially mastered certain grammatical aspects of Spanish. On the other hand, Valdés (2005) suggests that rather than incomplete <span class=\"gap-wrap\" data-gap=\"48\" data-answer=\"acquisition\"><input type=\"text\" class=\"gap-input\" data-gap=\"48\" aria-label=\"Gap 48\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(48)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan>, one possibility is that such speakers are actually acquiring a variety of the heritage language that is different from the varieties originally spoken in that language group. In such a case, the children can be considered to acquire a second dialect, which ultimately might require different teaching procedures than those best suited for children who experience incomplete acquisition of grammatical forms. Valdés (2005, p. 416) points out that:<\u002Fp>\n<p>. . . although we have some knowledge of the role of instruction in restructuring the interlanguages of L2 learners, we have no information about the role of formal instruction in restructuring or reshaping the knowledge system of learners who are in many ways quite different from traditional classroom learners.<\u002Fp>\n<p>Other studies have compared different groups of learners to determine whether different motivations characterize subgroups of heritage language learners. One study (Comanaru &amp; Noels, 2009) found that heritage learners of Chinese in a Canadian community differed little in terms of their self-concept and motivation for studying Chinese whether they already spoke Chinese as the heritage language or whether their L1 was English.<\u002Fp>\n<h3 class=\"section-h\">3.3  summing up<\u002Fh3>\n<p>Language development and outcomes are likely to vary enormously across different learning situations. Immigration to a new cultural and linguistic setting under less than ideal circumstances poses particular challenges for the language learner. In general, naturalistic settings, including study abroad experiences, allow opportunities to use the target language in a variety of contexts; such settings are likely to influence language learning differently compared to more formal classroom instruction in which learners receive fewer opportunities to engage in conversations with native speakers and use the language to carry out daily activities. This chapter has also reviewed a number of <span class=\"gap-wrap\" data-gap=\"49\" data-answer=\"distinct\"><input type=\"text\" class=\"gap-input\" data-gap=\"49\" aria-label=\"Gap 49\" autocomplete=\"off\" autocapitalize=\"none\" autocorrect=\"off\" spellcheck=\"false\"><span class=\"gap-num\">(49)<\u002Fspan><span class=\"gap-feedback\" aria-live=\"polite\"><\u002Fspan><\u002Fspan> instructional settings, including traditional classroom instruction, bilingual education, immersion, dual language, and heritage language instruction. These different learning contexts, together with variables associated with particular instructional methods (see Chapter 5), and individual learner differences (see Chapter 7 and Chapter 8), are likely to affect language learning in important ways.<\u002Fp>\n<h3 class=\"section-h\">key concepts<\u002Fh3>\n<ul>\n<li>Subtractive bilingualism<\u002Fli>\n<li>Bilingual education<\u002Fli>\n<li>Immersion education or instruction<\u002Fli>\n<li>Dual language instruction<\u002Fli>\n<li>Additive bilingualism<\u002Fli>\n<li>Heritage language<\u002Fli>\n<\u002Ful>\n<h3 class=\"section-h\">self-assessment questions<\u002Fh3>\n<div class=\"mcq\"><p class=\"mcq-q\">Which of the following best describes the instructional system adapted for a child from a Mandarin-speaking family living in the United States, attending the local public school, whose parents want her to learn Mandarin in an after-school program?<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>bilingual education<\u002Fli>\n<li>immersion program<\u002Fli>\n<li>dual language instruction<\u002Fli>\n<li>heritage language instruction<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">Two main types of bilingual education programs are (choose two answers):<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>mainstream education<\u002Fli>\n<li>transitional<\u002Fli>\n<li>developmental<\u002Fli>\n<li>study abroad<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">A term often used when a language is added without detrimental effects to the learner’s competence in the native language is:<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>additive bilingualism<\u002Fli>\n<li>subtractive bilingualism<\u002Fli>\n<li>culture shock<\u002Fli>\n<li>none of the above<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">The language instruction type most closely related to the notion of a family relevance is:<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>dual language instruction<\u002Fli>\n<li>immersion instruction<\u002Fli>\n<li>heritage language instruction<\u002Fli>\n<li>none of the above<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">FLES program types refer to language instruction:<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>at secondary school level<\u002Fli>\n<li>at elementary school level<\u002Fli>\n<li>for adults<\u002Fli>\n<li>for immigrants<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">All the following terms have been used for the notion of dual language instruction except:<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>two-way immersion (TWI)<\u002Fli>\n<li>bilingual immersion<\u002Fli>\n<li>development bilingual education (DBE)<\u002Fli>\n<li>heritage language instruction<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<div class=\"mcq\"><p class=\"mcq-q\">In this chapter, which item below was pointed out as an important factor in evaluating the effectiveness of study abroad experiences?<\u002Fp><ol type=\"a\" class=\"mcq-opts\">\n<li>type and intensity of contact with native speakers<\u002Fli>\n<li>age of study abroad participants<\u002Fli>\n<li>gender of native speakers<\u002Fli>\n<li>none of the above<\u002Fli>\n<\u002Fol><\u002Fdiv>\n<h3 class=\"section-h\">discussion questions<\u002Fh3>\n<ul>\n<li>Discuss the various pros and cons of traditional bilingual education programs in the United States. What factors other than academic considerations might motivate those who criticize or promote such programs?<\u002Fli>\n<li>Compare learning an L2 through an immersion program vs learning through a dual language program. What do you see as advantages and disadvantages of each format?<\u002Fli>\n<li>What do you think is important in order to get the most out of a study abroad experience, in terms of improving language skills?<\u002Fli>\n<li>What differences might there be in terms of previous heritage language experience for heritage learners? What impact might those differences have on experiences in a heritage language classroom?<\u002Fli>\n<\u002Ful>\n<h3 class=\"section-h\">exercises/project ideas<\u002Fh3>\n<ul>\n<li>Find out what immigrant groups have settled in your local community. What are the main first languages among these groups? In what ways are they helped to learn the local language? If possible, try to meet with someone who has immigrated in the past five years and find out what specific ways he/she received assistance in learning the local language from local government services or community organizations.<\u002Fli>\n<li>Search the Internet for an example of a school offering an immersion program or a dual language program and describe its target population and characteristics.<\u002Fli>\n<li>Interview someone you know who has learned a language other than your own native language and find out how this individual learned the language. Describe the ways used to learn the language. What were the challenges he/she faced?<\u002Fli>\n<\u002Ful>\n<h3 class=\"section-h\">further reading and viewing<\u002Fh3>\n<p>Baker, C. (2007). A parents’ and teachers’ guide to bilingualism (3rd ed.). Clevedon, England: Multilingual Matters.<\u002Fp>\n<p>A general introduction to answer basic questions and guide parents and teachers about issues surrounding bilingualism and bilingual education.<\u002Fp>\n<p>Baker, C. (2011). Foundations of bilingual education and bilingualism (5th ed.). Clevedon, UK: Multilingual Matters.<\u002Fp>\n<p>Thorough and accessible introduction to bilingual education and issues in bilingualism, in its fifth edition.<\u002Fp>\n<p>Chapelle, C.A. (Ed.) (2012). Wiley encyclopedia of applied linguistics. Oxford: Wiley-Blackwell.<\u002Fp>\n<p>For further descriptions about terms and concepts presented in this chapter and throughout the remaining chapters, C. Chapelle’s edited encyclopedia is an excellent online resource.<\u002Fp>\n<p>Garcia, O. (2008). Bilingual education in the 21st century: A global perspective. Boston: Wiley-Blackwell.<\u002Fp>\n<p>A comprehensive look at bilingual education and its manifestations worldwide.<\u002Fp>\n<p>Garcia, O., &amp; Baker, C. (2007). Bilingual education: An introductory reader. Clevedon, UK: Multilingual Matters.<\u002Fp>\n<p>Accessible introduction to bilingual education.<\u002Fp>\n<p>Genesee, F. (1987). Learning through two languages. Boston: Heinle &amp; Heinle.<\u002Fp>\n<p>Excellent overview of bilingual education, and in particular immersion programs, in Canada and the US.<\u002Fp>\n<p>Roca, A., &amp; Colombi, tune &amp; D.J. Tedick (Eds.), Pathways to bilingualism: Evolving perspectives on immersion education (pp. 177–200). Clevedon, UK: Multilingual Matters.<\u002Fp>\n<p>Longcope, P.D. (2003). What is the impact of study abroad on L2 learning? A descriptive study of context, conditions, and outcomes. Unpublished PhD thesis, University of Pennsylvania. Dissertation Abstracts International A, 64(4), 1199.<\u002Fp>\n<p>Murtagh, L. (2007). Out-of-school use of Irish, motivation to learn the language and proficiency in immersion and subject-only post-primary programmes. International Journal of Bilingualism and Bilingual Education, 10(4), pp. 428–453.<\u002Fp>\n<p>Netten, J., &amp; Germain, C. (2004). Developing the curriculum for intensive French. Canadian Modern Language Review, 60(3), 295–308.<\u002Fp>\n<p>Norton, B. (2000). Identity and language learning: Gender, ethnicity and educational change. Harlow, UK: Longman/Pearson Education.<\u002Fp>\n<p>Norton, B. (2001). Non-participation, imagined communities, and the language classroom. In M. Breen (Ed.), Learner contributions to language learning: New directions in research (pp. 159–171). Harlow, UK: Longman/Pearson Education.<\u002Fp>\n<p>Norton Peirce, B. (1995). Social identity, investment, and language learning. TESOL Quarterly, 29(1), 9–31.<\u002Fp>\n<p>Oyama, S. (1976). A sensitive period in the acquisition of a non-native phonological system. Journal of Psycholinguistic Research, 5, 261–285.<\u002Fp>\n<p>Polinsky, M., &amp; Kagan, O. (2007). Heritage languages: In the wild and in the classroom. Language and Linguistics Compass, 1(5), 368–395. Retrieved from http://scholar.harvard.edu/files/mpolinsky/files/Offprint.pdf<\u002Fp>\n<p>Ramirez, J.D. (1992). Longitudinal study of structured English immersion strategy early-exit and late-exit transitional bilingual education programs for language minority children (Executive summary). Bilingual Research Journal, 16(1&amp;2), 1–62.<\u002Fp>\n<p>Rhodes, N.C., &amp; Pufahl, I. (2009). Foreign language teaching in U.S. schools, results of a national survey. Center for Applied Linguistics. Retrieved from http://www.cal.org/projects/exec%20summary_111009.pdf<\u002Fp>\n<p>Silva-Corvalán, C. (1994). Language contact and change. Spanish in Los Angeles. Oxford: Clarendon Press.<\u002Fp>\n<p>Silva-Corvalán, C. (2003). Linguistic consequences of reduced input in bilingual first language acquisition. In S. Montrul &amp; F. Ordonez (Eds.), Linguistic theory and language development in Hispanic languages (pp. 375–397). Somerville, MA: Cascadilla Press.<\u002Fp>\n<p>Swain, M. (1975). Writing skills of grade three French immersion pupils. Working Papers on Bilingualism, 7, 1–38.<\u002Fp>\n<p>Swain, M. (1978). French immersion: early, late, or partial? Canadian Modern Language Review, 34, 577–585.<\u002Fp>\n<p>Swain, M., &amp; Lapkin, S. (1982). Evaluating bilingual education: A Canadian case study. Clevedon, UK: Multilingual Matters.<\u002Fp>\n<p>Thomas, W.P., &amp; Collier, V. (2002). A national study of school effectiveness for language minority students’ long-term academic achievement. Santa Cruz, CA and Washington DC: Center for Research on Education, Diversity &amp; Excellence.<\u002Fp>\n<p>Valdés, G. (2000). The teaching of heritage languages: An introduction for Slavic-teaching professionals. In O. Kagan &amp; B. Rifkin (Eds.), The learning and teaching of Slavic languages and cultures (pp. 375–403). Bloomington, IN: Slavica.<\u002Fp>\n<p>Valdés, G. (2005). Bilingualism, heritage language learners, and SLA research: opportunities lost or seized? The Modern Language Journal, 89, 410–426.<\u002Fp>\n<p>Yashima, T., &amp; Zenuk-Nishide, L. (2008). The impact of learning contexts on proficiency, attitudes, and L2 communication: Creating an imagined international community. System, 36(4), 566–585.<\u002Fp>\n  <\u002Fsection>\n<\u002Fdiv>\n<script>\n(function(){\n  function normalize(str) {\n    if (!str) return '';\n    return str.toLowerCase().trim()\n      .replace(/[\\u2018\\u2019]/g, \"'\")\n      .replace(/[\\u201C\\u201D]/g, '\"')\n      .replace(/\\s+/g, ' ');\n  }\n  function checkInput(input) {\n    const wrap = input.parentElement;\n    const fb = wrap.querySelector('.gap-feedback');\n    const answer = wrap.getAttribute('data-answer') || '';\n    const value = input.value;\n    if (!value.trim()) {\n      input.classList.remove('correct', 'wrong', 'revealed');\n      fb.classList.remove('ok', 'no', 'show');\n      return null;\n    }\n    const ok = normalize(value) === normalize(answer);\n    input.classList.toggle('correct', ok);\n    input.classList.toggle('wrong', !ok);\n    input.classList.remove('revealed');\n    fb.classList.toggle('ok', ok);\n    fb.classList.toggle('no', !ok);\n    fb.classList.remove('show');\n    return ok;\n  }\n  function revealInput(input) {\n    const wrap = input.parentElement;\n    const fb = wrap.querySelector('.gap-feedback');\n    const answer = wrap.getAttribute('data-answer') || '';\n    input.value = answer;\n    input.classList.remove('correct', 'wrong');\n    input.classList.add('revealed');\n    fb.classList.remove('ok', 'no');\n    fb.classList.add('show');\n  }\n  function resetInput(input) {\n    const wrap = input.parentElement;\n    const fb = wrap.querySelector('.gap-feedback');\n    input.value = '';\n    input.classList.remove('correct', 'wrong', 'revealed');\n    fb.classList.remove('ok', 'no', 'show');\n  }\n  function updateGlobalStats() {\n    const inputs = document.querySelectorAll('.gap-input');\n    let correct = 0;\n    inputs.forEach(inp => { if (inp.classList.contains('correct')) correct++; });\n    const total = inputs.length;\n    document.getElementById('score-text').textContent = correct + ' / ' + total + ' correct';\n    document.getElementById('score-bar').style.width = (total ? (correct / total * 100) : 0) + '%';\n  }\n  document.addEventListener('input', (e) => {\n    if (e.target.classList.contains('gap-input')) {\n      const fb = e.target.parentElement.querySelector('.gap-feedback');\n      e.target.classList.remove('correct', 'wrong', 'revealed');\n      fb.classList.remove('ok', 'no', 'show');\n      updateGlobalStats();\n    }\n  });\n  document.addEventListener('blur', (e) => {\n    if (e.target.classList.contains('gap-input') && e.target.value.trim()) {\n      checkInput(e.target);\n      updateGlobalStats();\n    }\n  }, true);\n  document.addEventListener('keydown', (e) => {\n    if (e.target.classList.contains('gap-input') && e.key === 'Enter') {\n      e.preventDefault();\n      checkInput(e.target);\n      updateGlobalStats();\n      const inputs = [...document.querySelectorAll('.gap-input')];\n      const idx = inputs.indexOf(e.target);\n      if (idx >= 0 && idx + 1 < inputs.length) inputs[idx + 1].focus();\n    }\n  });\n  document.getElementById('btn-check-all').addEventListener('click', () => {\n    document.querySelectorAll('.gap-input').forEach(inp => { if (inp.value.trim()) checkInput(inp); });\n    updateGlobalStats();\n    const summary = document.getElementById('summary-top');\n    const total = document.querySelectorAll('.gap-input').length;\n    const correct = document.querySelectorAll('.gap-input.correct').length;\n    summary.innerHTML = '<strong>' + correct + ' / ' + total + ' correct.<\u002Fstrong> Review any incorrect answers and try again.';\n    summary.classList.add('show');\n  });\n  document.getElementById('btn-reveal-all').addEventListener('click', () => {\n    document.querySelectorAll('.gap-input').forEach(revealInput);\n    updateGlobalStats();\n  });\n  document.getElementById('btn-reset-all').addEventListener('click', () => {\n    document.querySelectorAll('.gap-input').forEach(resetInput);\n    document.getElementById('summary-top').classList.remove('show');\n    updateGlobalStats();\n  });\n  updateGlobalStats();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
